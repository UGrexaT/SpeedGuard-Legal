<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedGuard - Privacy Policy</title>
  <style>
    :root {
      --bg: #0D0D1A;
      --surface: #1A1A2E;
      --text: #E0E0E0;
      --text-muted: rgba(255, 255, 255, 0.55);
      --accent: #00C853;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .header .app-name {
      color: var(--accent);
    }

    .header .effective,
    .meta {
      color: var(--text-muted);
      font-size: 14px;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 40px 0 16px;
      color: #fff;
      letter-spacing: -0.2px;
    }

    h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 24px 0 10px;
      color: rgba(255, 255, 255, 0.85);
    }

    p,
    li {
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
    }

    ul {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    li {
      margin-bottom: 6px;
    }

    code {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.92em;
    }
